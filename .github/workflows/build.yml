name: Fix 3.9KB Issue
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Everything
        run: |
          dkp-pacman -Syyu --noconfirm || true
          dkp-pacman -S --noconfirm wut wut-tools wut-devel || true

      - name: Force New Build
        run: |
          export PATH=$PATH:/opt/devkitpro/devkitPPC/bin:/opt/devkitpro/wut/bin
          
          # Wir löschen die alte ELF intern, damit sie nicht versehentlich kopiert wird
          rm -f King-Gamepad-vWii.wps || true
          
          # Echter Kompilier-Befehl für Aroma-Plugins
          # Wenn das klappt, wird die Datei ca. 10-20 KB groß
          powerpc-eabi-gcc -O2 -Wall main.c -o King-Gamepad-vWii.elf \
            -specs=wiiu-wps.specs -L/opt/devkitpro/wut/lib -lwut \
            -D_WIIU_ -D_WUT_ -I/opt/devkitpro/wut/include || echo "Kompilieren fehlgeschlagen"

          # Umwandlung
          WPSGEN=$(find /opt/devkitpro -name "wut-wpsgen" | head -n 1) || true
          $WPSGEN King-Gamepad-vWii.elf King-Gamepad-vWii.wps || echo "WPS Erstellung fehlgeschlagen"
          
          # Letzte Rettung: Falls die WPS nicht erstellt wurde, 
          # schauen wir, ob wir wenigstens eine funktionierende ELF haben
          if [ ! -f King-Gamepad-vWii.wps ]; then
            cp King-Gamepad-vWii.elf King-Gamepad-vWii.wps || echo "Keine Datei erzeugt"
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Echtes-Plugin-Versuch
          path: King-Gamepad-vWii.wps
