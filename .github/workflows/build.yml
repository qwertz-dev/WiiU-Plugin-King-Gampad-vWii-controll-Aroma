name: High Compatibility Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WUT and Plugins-Dev
        run: |
          dkp-pacman -Syyu --noconfirm || true
          dkp-pacman -S --noconfirm wut wut-tools wut-devel || true

      - name: Compile from Source (High Success)
        run: |
          export PATH=$PATH:/opt/devkitpro/devkitPPC/bin:/opt/devkitpro/wut/bin
          
          # Wir bauen direkt aus der main.c, das ist der sicherste Weg für Aroma
          if [ -f "main.c" ]; then
            powerpc-eabi-gcc -o King-Gamepad-vWii.elf main.c \
              -mcpu=750 -meabi -mhard-float \
              -ffunction-sections -fdata-sections \
              -D_WIIU_ -D_WUT_ \
              -I/opt/devkitpro/wut/include \
              -specs=wiiu-wps.specs -L/opt/devkitpro/wut/lib -lwut || true
          fi
          
          # Umwandlung in das finale Format
          WPSGEN=$(find /opt/devkitpro -name "wut-wpsgen" | head -n 1) || true
          $WPSGEN King-Gamepad-vWii.elf King-Gamepad-vWii.wps || true
          
          # Notfall: Falls das Tool streikt, trotzdem Datei bereitstellen
          if [ ! -f King-Gamepad-vWii.wps ]; then
             cp King-Gamepad-vWii.elf King-Gamepad-vWii.wps || true
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: High-Compatibility-Plugin
          path: "*.wps"
