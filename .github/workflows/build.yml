name: ELF to WPS
on: [push]
jobs:
  convert:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm wut

      - name: Convert ELF to WPS
        run: |
          # Wir erzwingen den Pfad zu den WUT-Tools
          export PATH=$PATH:/opt/devkitpro/wut/bin
          wut-wpsgen King-Gamepad-vWii.elf King-Gamepad-vWii.wps
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Fertiges-Plugin
          path: King-Gamepad-vWii.wps
