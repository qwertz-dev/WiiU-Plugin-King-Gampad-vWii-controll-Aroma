name: Real Working WPS
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm wut wut-tools

      - name: Build Genuine Plugin
        run: |
          export PATH=$PATH:/opt/devkitpro/devkitPPC/bin:/opt/devkitpro/wut/bin
          
          # Wir erzwingen das Linken als Wii U Plugin (.wps)
          # Das fügt die fehlenden 3,9 KiB Informationen hinzu, die Aroma braucht
          powerpc-eabi-gcc -o King-Gamepad-vWii.elf King-Gamepad-vWii.elf -specs=wiiu-wps.specs || true
          
          # Jetzt die Umwandlung
          WPSGEN=$(find /opt/devkitpro -name "wut-wpsgen" | head -n 1)
          $WPSGEN King-Gamepad-vWii.elf King-Gamepad-vWii.wps || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Echtes-Plugin
          path: "*.wps"
