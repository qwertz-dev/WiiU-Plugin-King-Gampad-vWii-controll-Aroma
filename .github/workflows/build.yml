name: ELF to WPS
on: [push]
jobs:
  convert:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Tools
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm wut
      - name: Convert
        run: /opt/devkitpro/wut/bin/wut-wpsgen King-Gamepad-vWii.elf King-Gamepad-vWii.wps
      - name: Download
        uses: actions/upload-artifact@v3
        with:
          name: Fertiges-Plugin
          path: King-Gamepad-vWii.wps
