name: Build From Scratch
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean and Install
        run: |
          # Radikal-Löschung der alten Schrott-Dateien
          rm -f King-Gamepad-vWii.elf King-Gamepad-vWii.wps
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm wut wut-tools wut-devel

      - name: Force Rebuild
        run: |
          export PATH=$PATH:/opt/devkitpro/devkitPPC/bin:/opt/devkitpro/wut/bin
          
          # Wir bauen NUR aus der main.c
          # Wenn hier ein Fehler ist, wird KEINE Datei erstellt (besser als eine kaputte)
          powerpc-eabi-gcc -O2 main.c -o King-Gamepad-vWii.elf \
            -specs=wiiu-wps.specs -L/opt/devkitpro/wut/lib -lwut \
            -D_WIIU_ -D_WUT_ -I/opt/devkitpro/wut/include
          
          # Konvertierung zu WPS
          WPSGEN=$(find /opt/devkitpro -name "wut-wpsgen" | head -n 1)
          $WPSGEN King-Gamepad-vWii.elf King-Gamepad-vWii.wps

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Echtes-Plugin
          path: King-Gamepad-vWii.wps
