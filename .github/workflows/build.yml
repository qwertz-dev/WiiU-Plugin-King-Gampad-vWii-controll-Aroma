name: ELF to WPS
on: [push]
jobs:
  convert:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm wut

      - name: Force Convert
        run: |
          # Berechtigungen setzen
          chmod +x King-Gamepad-vWii.elf
          
          # Das Tool finden und direkt ausführen
          WPS_TOOL=$(find /opt/devkitpro -name "wut-wpsgen")
          $WPS_TOOL King-Gamepad-vWii.elf King-Gamepad-vWii.wps
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Fertiges-Plugin
          path: King-Gamepad-vWii.wps
