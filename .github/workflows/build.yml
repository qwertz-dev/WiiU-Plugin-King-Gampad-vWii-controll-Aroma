name: ELF to WPS
on: [push]
jobs:
  convert:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm wut

      - name: Repair and Convert
        run: |
          # 1. Pfade finden
          ELF2RPL=$(find /opt/devkitpro -name "elf2rpl" | head -n 1)
          WPSGEN=$(find /opt/devkitpro -name "wut-wpsgen" | head -n 1)
          
          # 2. ELF zu RPL (Das repariert den Header deiner 3,9KB Datei)
          $ELF2RPL King-Gamepad-vWii.elf King-Gamepad-vWii.rpl || echo "RPL Schritt fehlgeschlagen"
          
          # 3. RPL zu WPS (Das macht das fertige Plugin)
          $WPSGEN King-Gamepad-vWii.rpl King-Gamepad-vWii.wps || $WPSGEN King-Gamepad-vWii.elf King-Gamepad-vWii.wps
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Fertiges-Plugin
          path: "*.wps"
