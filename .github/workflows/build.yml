name: ELF to WPS
on: [push]
jobs:
  convert:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WUT
        run: |
          # Wir stellen sicher, dass dkp-pacman das Tool wirklich holt
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm wut

      - name: Convert
        run: |
          # Wir erzwingen den direkten Pfad, wo devkitpro seine Tools ablegt
          /opt/devkitpro/wut/bin/wut-wpsgen King-Gamepad-vWii.elf King-Gamepad-vWii.wps
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Fertiges-Plugin
          path: King-Gamepad-vWii.wps
