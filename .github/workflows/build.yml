name: ELF to WPS
on: [push]
jobs:
  convert:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm wut

      - name: Locate and Convert
        run: |
          # Wir suchen jetzt auf dem ganzen Server nach der Datei
          TOOL_PATH=$(find / -name "wut-wpsgen" 2>/dev/null | head -n 1)
          
          if [ -z "$TOOL_PATH" ]; then
            echo "Tool wurde nirgendwo gefunden!"
            exit 1
          fi
          
          echo "Tool gefunden in: $TOOL_PATH"
          $TOOL_PATH King-Gamepad-vWii.elf King-Gamepad-vWii.wps
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Fertiges-Plugin
          path: King-Gamepad-vWii.wps
