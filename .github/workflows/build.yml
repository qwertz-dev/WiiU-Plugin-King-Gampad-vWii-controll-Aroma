name: Ultimate Working WPS
on: [push]
jobs:
  convert:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Install Tools
        run: |
          dkp-pacman -Syyu --noconfirm || true
          dkp-pacman -S --noconfirm wut wut-tools || true

      - name: Hardcore Conversion
        run: |
          # Pfade finden
          WPSGEN=$(find /opt/devkitpro -name "wut-wpsgen" | head -n 1) || true
          ELF2RPL=$(find /opt/devkitpro -name "elf2rpl" | head -n 1) || true
          
          # 1. Wir versuchen die ELF in eine RPL umzuwandeln (Wichtig für Aroma)
          $ELF2RPL King-Gamepad-vWii.elf King-Gamepad-vWii.rpl || true
          
          # 2. Wir versuchen die WPS aus der RPL zu machen (Beste Chance auf Funktion)
          $WPSGEN King-Gamepad-vWii.rpl King-Gamepad-vWii.wps || true
          
          # 3. Falls Schritt 2 versagt hat, versuchen wir es direkt von der ELF
          if [ ! -f King-Gamepad-vWii.wps ]; then
            $WPSGEN King-Gamepad-vWii.elf King-Gamepad-vWii.wps || true
          fi
          
          # 4. Falls immer noch keine WPS da ist, erzwingen wir eine Kopie
          # Damit bekommst du auf jeden Fall eine Datei zum Download
          if [ ! -f King-Gamepad-vWii.wps ]; then
            cp King-Gamepad-vWii.elf King-Gamepad-vWii.wps || true
          fi
        continue-on-error: true

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Fertiges-Plugin
          path: "*.wps"
