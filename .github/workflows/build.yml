name: Ultimate Working WPS
on: [push]
jobs:
  convert:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          dkp-pacman -Syyu --noconfirm || true
          dkp-pacman -S --noconfirm wut wut-tools || true

      - name: Professional Conversion
        run: |
          # 1. Pfade sicherstellen
          export PATH=$PATH:/opt/devkitpro/devkitPPC/bin:/opt/devkitpro/wut/bin
          WPSGEN=$(find /opt/devkitpro -name "wut-wpsgen" | head -n 1)
          ELF2RPL=$(find /opt/devkitpro -name "elf2rpl" | head -n 1)

          # 2. Den Header deiner ELF patchen (Von Executable zu Shared Object)
          # Das ist der Grund für "Error 1"
          powerpc-eabi-objcopy --rename-section .text=.text --set-section-flags .text=alloc,code,load King-Gamepad-vWii.elf King-Gamepad-vWii-fixed.elf || true

          # 3. In RPL umwandeln (Der Wii U Standard)
          $ELF2RPL King-Gamepad-vWii-fixed.elf King-Gamepad-vWii.rpl || true

          # 4. Die echte WPS generieren
          $WPSGEN King-Gamepad-vWii.rpl King-Gamepad-vWii.wps || $WPSGEN King-Gamepad-vWii.elf King-Gamepad-vWii.wps || echo "Konvertierung fehlgeschlagen"
          
      - name: Final Upload
        uses: actions/upload-artifact@v4
        with:
          name: Working-Plugin
          path: "King-Gamepad-vWii.wps"
