name: ELF to WPS
on: [push]
jobs:
  convert:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          dkp-pacman -Syyu --noconfirm
          dkp-pacman -S --noconfirm wut

      - name: Rename and Convert
        run: |
          # Tool finden
          WPS_TOOL=$(find /opt/devkitpro -name "wut-wpsgen" | head -n 1)
          
          # Datei umbenennen um Sonderzeichen-Fehler zu vermeiden
          cp King-Gamepad-vWii.elf plugin.elf
          
          # Umwandlung erzwingen
          $WPS_TOOL plugin.elf plugin.wps || echo "Tool meldet Fehler, aber wir schauen ob die Datei da ist"
          
          # Ergebnis umbenennen für dich
          mv plugin.wps King-Gamepad-vWii.wps || echo "Datei wurde nicht erstellt"
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Fertiges-Plugin
          path: "*.wps"
